<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Amiibo Generator Pro (Wumiibo & Foomiibo)</title>
    
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.10.19/css/dataTables.bootstrap4.min.css">
    <link rel="icon" type="image/x-icon" href="https://raw.githubusercontent.com/Little-Night-Wolf/amiibo-generator/main/favicon.svg">
    
    <style>
        body { background-color: #1F2021; color: #FBF7F5; padding: 20px 0; }
        input { background-color: #121212 !important; color: #fff !important; border-color: #333 !important; }
        .btn-wumiibo { background-color: #375a7f; color: white; border: none; }
        .btn-wumiibo:hover { background-color: #2b4764; }
        .btn-foomiibo { background-color: #e60012; color: white; border: none; }
        .btn-foomiibo:hover { background-color: #b3000e; }
        .btn-advanced { background-color: #444; color: white; }
        .amiibo-image img { max-height: 128px; max-width: 128px; border-radius: 4px; background: #333; }
        .hide_until_zipped { display: none; }
        .badge-group { font-size: 0.85em; padding: 5px 10px; font-weight: bold; text-transform: uppercase; }
        #advancedMode { display: none; background: #2c2c2c; padding: 30px; border-radius: 15px; border: 2px solid #e60012; margin-bottom: 30px; }
        select { border: 1px solid #333 !important; background-color: #121212 !important; color: #fff !important;}
        .dropdown-item:hover { background-color: #444; color: #fff; }
    </style>

    <script src="https://code.jquery.com/jquery-3.4.1.js"></script>
    <script src="https://cdn.datatables.net/1.10.19/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.10.19/js/dataTables.bootstrap4.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/downloadjs/1.4.8/download.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.5.0/jszip.min.js"></script>
</head>
<body>
    <div class="container-fluid">
        <div id="advancedMode">
            <h2 class="text-danger">Advanced Foomiibo Generator</h2>
            <div class="row">
                <div class="col-md-6">
                    <label>Amiibo ID:</label>
                    <input type="text" id="advId" class="form-control inputBox mb-3" readonly>
                    
                    <label>UID (9 bytes hex):</label>
                    <div class="input-group mb-3">
                        <input type="text" id="advUID" class="form-control inputBox" placeholder="04XXXXXXXXXXXXXX">
                        <div class="input-group-append">
                            <button class="btn btn-outline-secondary" type="button" onclick="generateNewAdvUID()">Random</button>
                        </div>
                    </div>

                    <label>Custom Signature (Text):</label>
                    <input type="text" id="advSig" class="form-control inputBox mb-1" maxlength="32">
                    
                    <div class="custom-control custom-checkbox mb-3">
                        <input type="checkbox" class="custom-control-input" id="advNoSig">
                        <label class="custom-control-label text-muted" for="advNoSig" style="font-size: 0.9em;">
                            Do not include TagMo signature (Generate exact 540-byte file)
                        </label>
                    </div>

                    <button class="btn btn-danger btn-block" onclick="downloadAdvanced()">Download Foomiibo .bin</button>
                    <a href="index.html" class="btn btn-link text-white mt-2">← Back to List</a>
                </div>
            </div>
        </div>

        <div id="mainContent">
            <div class="row mb-4">
                <div class="col-sm-12">
                    <h2 class="mb-1">Amiibo Generator Pro</h2>
                    <div class="hide_until_zipped">
                        <button id="downloadWumiiboZip" class="btn btn-sm btn-primary">Download All (Wumiibo ZIP)</button>
                        <button id="downloadFoomiiboZip" class="btn btn-sm btn-danger ml-2">Download All (Foomiibo ZIP)</button>
                    </div>
                </div>
            </div>
            
            <div class="row mb-3 align-items-end">
                <div class="col-md-3">
                    <label class="small text-muted">Group</label>
                    <select id="filterGroup" class="form-control"></select>
                </div>
                <div class="col-md-3">
                    <label class="small text-muted">Series</label>
                    <select id="filterSeries" class="form-control"></select>
                </div>
                <div class="col-md-4">
                    <label class="small text-muted">Quick Search</label>
                    <input type="text" id="input" class="form-control inputBox" placeholder="Name, ID, Group...">
                </div>
            </div>

            <div class="table-responsive">
                <table id="dataTable" class="table table-striped table-bordered table-dark w-100">
                    <thead>
                        <tr>
                            <th>Image</th>
                            <th>Name</th>
                            <th>Amiibo ID</th>
                            <th>Series</th>
                            <th>Group</th>
                            <th>Rel. EU</th>
                            <th>Rel. NA</th>
                            <th>Downloads</th>
                        </tr>
                    </thead> 
                    <tbody></tbody>            
                </table>
            </div>
        </div>
    </div>
    
    <script src="script.js" type="text/javascript"></script>
</body>
</html>
